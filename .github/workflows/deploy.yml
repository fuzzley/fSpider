name: Build and Sync to Main Website

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force:
        description: 'Force deployment even if there are no changes'
        required: false
        type: boolean
        default: false

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fSpider
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build

      - name: Configure git credentials
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync built assets to fuzzley/fuzzley
        env:
          PAT_TOKEN: ${{ secrets.MAIN_REPO_DEPLOY_PAT }}
          FORCE_DEPLOY: ${{ github.event.inputs.force }}
        run: |
          # 1. Clone the main website repository (fuzzley/fuzzley)
          git clone --depth 1 https://x-access-token:${{ env.PAT_TOKEN }}@github.com/fuzzley/fuzzley.git main-website

          # 2. Define the destination folder in the website repo
          DEST_DIR="main-website/project/spider"

          # 3. Clean out any old files
          rm -rf "$DEST_DIR"
          mkdir -p "$DEST_DIR"

          # 4. Copy new build files
          cp -r dist/* "$DEST_DIR"/

          # 5. Commit and push the updates if there are changes
          cd main-website
          git add .

          if git diff-index --quiet HEAD && [ "$FORCE_DEPLOY" != "true" ]; then
            echo "No changes in fSpider production build. Skipping commit."
          else
            git commit --allow-empty -m "chore(deploy): sync fSpider production build from fuzzley/fSpider@${{ github.sha }}"
            git push origin HEAD
          fi

      - name: Sync built assets to fuzzley/fuzzley.github.io
        env:
          PAT_TOKEN: ${{ secrets.MAIN_REPO_DEPLOY_PAT }}
          FORCE_DEPLOY: ${{ github.event.inputs.force }}
        run: |
          # 1. Clone the github.io repository
          git clone --depth 1 https://x-access-token:${{ env.PAT_TOKEN }}@github.com/fuzzley/fuzzley.github.io.git github-io-website

          # 2. Define the destination folder
          DEST_DIR="github-io-website/project/spider"

          # 3. Clean out any old files
          rm -rf "$DEST_DIR"
          mkdir -p "$DEST_DIR"

          # 4. Copy new build files
          cp -r dist/* "$DEST_DIR"/

          # 5. Commit and push the updates if there are changes
          cd github-io-website
          git add .

          if git diff-index --quiet HEAD && [ "$FORCE_DEPLOY" != "true" ]; then
            echo "No changes in fSpider production build. Skipping commit."
          else
            git commit --allow-empty -m "chore(deploy): sync fSpider production build from fuzzley/fSpider@${{ github.sha }}"
            git push origin HEAD
          fi
